# This is the main CI workflow that runs the test suite on all pushes to main and all pull requests.
# It runs the following jobs:
# - required: runs the test suite on ubuntu with stable and beta rust toolchains
# - minimal: runs the test suite with the minimal versions of the dependencies that satisfy the
#   requirements of this crate, and its dependencies
# - os-check: runs the test suite on mac and windows
# - coverage: runs the test suite and collects coverage information
# See check.yml for information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: test
jobs:
  required:
    runs-on: ubuntu-latest
    name: ubuntu / ${{ matrix.toolchain }}
    strategy:
      matrix:
        # run on stable and beta to ensure that tests won't break on the next version of the rust
        # toolchain
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure CI host
        run: ./configure-ci.sh
      - name: Install ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: cargo generate-lockfile
        # enable this ci template to run regardless of whether the lockfile is checked in or not
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # https://twitter.com/jonhoo/status/1571290371124260865
      - name: cargo test --locked
        run: cargo test --locked --all-features --all-targets
      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked --all-features --doc
  integration:
    # Exercise the data path against a real RDMA device. The integration tests are #[ignore]d
    # because they need a device, so the rest of CI only compile-checks them. Here we stand up a
    # Soft-RoCE (rxe) device by building the rdma_rxe kernel module from the matching upstream
    # kernel source (the runner's own kernel ships only siw) and attaching it to the runner's
    # network interface, then run the ignored tests against it. Pinned to 22.04: the rxe module we
    # build from v6.8 source is reliable, whereas the build for ubuntu-latest's newer (6.17) kernel
    # drops completions on most two-sided transfers (its source diverges more from the azure kernel).
    runs-on: ubuntu-22.04
    name: ubuntu / stable / soft-roce
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure CI host
        run: ./configure-ci.sh
      - name: Set up a Soft-RoCE (rxe) device
        run: |
          set -euxo pipefail
          # GitHub-hosted runner kernels ship the siw module but not rdma_rxe, so build the rxe
          # module from the matching upstream kernel source against the running kernel's headers
          # and load that. rxe is a software RoCE provider, so this needs no special hardware.
          sudo apt-get install -y --no-install-recommends \
            linux-headers-"$(uname -r)" build-essential libelf-dev dwarves git \
            ibverbs-providers ibverbs-utils iproute2
          src=$(uname -r); src=${src%%-*}; src=${src%.0}   # 6.8.0-1059-azure -> 6.8 (the tag name)
          # Fetch just the rxe driver directory rather than the whole kernel tree.
          git clone --quiet --depth 1 --filter=tree:0 --sparse --branch "v${src}" \
            https://github.com/torvalds/linux.git linux-src
          git -C linux-src sparse-checkout set drivers/infiniband/sw/rxe
          cd linux-src/drivers/infiniband/sw/rxe
          # Turn the in-tree build file into an out-of-tree module build forced on.
          mv Makefile Kbuild
          sed -i 's/$(CONFIG_RDMA_RXE)/m/g' Kbuild
          make -C "/lib/modules/$(uname -r)/build" M="$PWD" modules
          sudo mkdir -p "/lib/modules/$(uname -r)/extra"
          sudo cp rdma_rxe.ko "/lib/modules/$(uname -r)/extra/"
          sudo depmod -a
          sudo modprobe rdma_rxe
          netdev=$(ip -o -4 route show to default | awk '{print $5; exit}')
          echo "Attaching rxe0 to $netdev"
          sudo rdma link add rxe0 type rxe netdev "$netdev"
          rdma link
          ibv_devices
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo test -- --ignored
        env:
          IBVERBS_TEST_DEVICE: rxe0
        # Run serially: the tests share one rxe device, and Soft-RoCE drops completions when many
        # queue pairs drive it concurrently. The three skipped tests cover RC atomics and the UC/UD
        # transports, which this rxe build does not handle correctly (they pass on real hardware and
        # a current 7.x kernel); everything else gates the full RC data path.
        run: |
          cargo test --locked --test loopback -- --ignored --test-threads=1 \
            --skip atomic_operations \
            --skip unreliable_connection \
            --skip unreliable_datagram
  minimal:
    # This action chooses the oldest version of the dependencies permitted by Cargo.toml to ensure
    # that this crate is compatible with the minimal version that this crate and its dependencies
    # require. This will pickup issues where this create relies on functionality that was introduced
    # later than the actual version specified (e.g., when we choose just a major version, but a
    # method was added after this version).
    #
    # This particular check can be difficult to get to succeed as often transitive dependencies may
    # be incorrectly specified (e.g., a dependency specifies 1.0 but really requires 1.1.5). There
    # is an alternative flag available -Zdirect-minimal-versions that uses the minimal versions for
    # direct dependencies of this crate, while selecting the maximal versions for the transitive
    # dependencies. Alternatively, you can add a line in your Cargo.toml to artificially increase
    # the minimal dependency, which you do with e.g.:
    # ```toml
    # # for minimal-versions
    # [target.'cfg(any())'.dependencies]
    # openssl = { version = "0.10.55", optional = true } # needed to allow foo to build with -Zminimal-versions
    # ```
    # The optional = true is necessary in case that dependency isn't otherwise transitively required
    # by your library, and the target bit is so that this dependency edge never actually affects
    # Cargo build order. See also
    # https://github.com/jonhoo/fantoccini/blob/fde336472b712bc7ebf5b4e772023a7ba71b2262/Cargo.toml#L47-L49.
    # This action is run on ubuntu with the stable toolchain, as it is not expected to fail
    runs-on: ubuntu-latest
    name: ubuntu / stable / minimal-versions
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure CI host
        run: ./configure-ci.sh
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install nightly for -Zminimal-versions
        uses: dtolnay/rust-toolchain@nightly
      - name: rustup default stable
        run: rustup default stable
      - name: cargo update -Zminimal-versions
        run: cargo +nightly update -Zminimal-versions
      - name: cargo test
        run: cargo test --locked --all-features --all-targets
  coverage:
    # use llvm-cov to build and collect coverage and outputs in a format that
    # is compatible with codecov.io
    #
    # note that codecov as of v4 requires that CODECOV_TOKEN from
    #
    #   https://app.codecov.io/gh/<user or org>/<project>/settings
    #
    # is set in two places on your repo:
    #
    # - https://github.com/jonhoo/guardian/settings/secrets/actions
    # - https://github.com/jonhoo/guardian/settings/secrets/dependabot
    #
    # (the former is needed for codecov uploads to work with Dependabot PRs)
    #
    # PRs coming from forks of your repo will not have access to the token, but
    # for those, codecov allows uploading coverage reports without a token.
    # it's all a little weird and inconvenient. see
    #
    #   https://github.com/codecov/feedback/issues/112
    #
    # for lots of more discussion
    runs-on: ubuntu-latest
    name: ubuntu / stable / coverage
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure CI host
        run: ./configure-ci.sh
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: cargo install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo llvm-cov
        run: cargo llvm-cov --locked --all-features --lcov --output-path lcov.info
      - name: Record Rust version
        run: echo "RUST=$(rustc --version)" >> "$GITHUB_ENV"
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,RUST
